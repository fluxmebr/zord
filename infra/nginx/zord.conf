# ZORD Intelligence — Nginx Configuration
# Domain: zord.pro

# Rate limiting — prefixed zord_ to avoid conflicts with other VPS sites
limit_req_zone $binary_remote_addr zone=zord_api_rate:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=zord_auth_rate:10m rate=10r/m;

# Upstream — ports 4000 (web) / 4001 (api)
upstream zord_web {
    server 127.0.0.1:4000;
    keepalive 16;
}

upstream zord_api {
    server 127.0.0.1:4001;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name zord.pro www.zord.pro api.zord.pro;
    return 301 https://$host$request_uri;
}

# Main app — zord.pro
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zord.pro www.zord.pro;

    ssl_certificate /etc/letsencrypt/live/zord.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zord.pro/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ZORD_SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://zord_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Next.js static files
    location /_next/static {
        proxy_pass http://zord_web;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }
}

# API — api.zord.pro
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.zord.pro;

    ssl_certificate /etc/letsencrypt/live/zord.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zord.pro/privkey.pem;
    ssl_protocols TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Auth endpoint rate limiting
    location /api/v1/auth {
        limit_req zone=zord_auth_rate burst=5 nodelay;
        proxy_pass http://zord_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API general
    location /api {
        limit_req zone=zord_api_rate burst=20 nodelay;
        proxy_pass http://zord_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 100M;
    }

    # Block Swagger in production (uncomment to enable)
    # location /api/docs {
    #     return 403;
    # }
}
